const audioDB = new Promise((resolve, reject) => {
    let req = indexedDB.open("RoyEnglishDB", 1);
    req.onupgradeneeded = e => {
        let db = e.target.result;
        if(!db.objectStoreNames.contains("audioStore")) {
            db.createObjectStore("audioStore");
        }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
});

async function saveAudioToDB(id, blob) {
    try {
        let db = await audioDB;
        db.transaction("audioStore", "readwrite").objectStore("audioStore").put(blob, id);
    } catch(e) { console.error("DB Save Error:", e); }
}

async function loadAudioFromDB(id) {
    try {
        let db = await audioDB;
        return new Promise(resolve => {
            let req = db.transaction("audioStore").objectStore("audioStore").get(id);
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = () => resolve(null);
        });
    } catch(e) { return null; }
}

let currentDay = null;
let currentTab = 'listen';
let currentAudio = null;
let isPlayingAll = false;


let voiceCache = { dad: null, mom: null, son: null, daughter: null, inited: false };

function initVoices() {
    if(voiceCache.inited) return;
    let voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    if(voices.length === 0) return;
    
    let males = voices.filter(v => v.name.toLowerCase().match(/male|boy|daniel|david|mark|arthur/));
    let females = voices.filter(v => v.name.toLowerCase().match(/female|girl|samantha|victoria|karen|moira/));
    
    voiceCache.dad = males[0] || voices[0];
    voiceCache.mom = females[0] || voices[voices.length - 1];
    voiceCache.son = males[1] || males[0] || voices[0];
    voiceCache.daughter = females[1] || females[0] || voices[voices.length - 1];
    
    voiceCache.inited = true;
}
if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = initVoices;
}

function getSpeakerConfig(role) {
    switch(role) {
        case 'dad': return { name: '爸爸(罗威)', bg: 'bg-blue-50', border: 'border-blue-200', seed: 'Felix&hair=shortHairShortFlat&clothing=blazerAndShirt&facialHair=beardMedium', voiceType: 'dad', isLeft: true, iconColor: 'text-blue-400', textColor: 'text-slate-800' };
        case 'mom': return { name: '妈妈(熊单)', bg: 'bg-pink-50', border: 'border-pink-200', seed: 'Jocelyn&hair=longHairStraight&clothing=collarAndSweater', voiceType: 'mom', isLeft: false, iconColor: 'text-pink-400', textColor: 'text-slate-800' };
        case 'son': return { name: '儿子(光头)', bg: 'bg-green-50', border: 'border-green-200', seed: 'Leo&hair=noHair&clothing=graphicShirt', voiceType: 'son', isLeft: false, iconColor: 'text-green-400', textColor: 'text-slate-800' };
        case 'daughter': return { name: '女儿(妞妞)', bg: 'bg-yellow-50', border: 'border-yellow-200', seed: 'Lily&hair=pigtails&accessories=prescription02', voiceType: 'daughter', isLeft: true, iconColor: 'text-yellow-400', textColor: 'text-slate-800' };
        default: return { name: 'Robot', bg: 'bg-indigo-50', border: 'border-indigo-200', seed: 'bot', voiceType: 'mom', isLeft: true, iconColor: 'text-indigo-400', textColor: 'text-slate-800' };
    }
}

function speakWithGender(text, voiceType, onComplete) {
    initVoices();
    if ('speechSynthesis' in window) {
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.voice = voiceCache[voiceType];
        utterance.rate = 0.85;
        
        // Use pitch to distinguish kids if they share the same voice engine
        if (voiceType === 'son' && voiceCache.son === voiceCache.dad) utterance.pitch = 1.4;
        else if (voiceType === 'daughter' && voiceCache.daughter === voiceCache.mom) utterance.pitch = 1.4;
        else if (voiceType === 'dad') utterance.pitch = 0.8;
        else if (voiceType === 'mom') utterance.pitch = 1.1;
        
        utterance.onend = onComplete;
        utterance.onerror = () => playYoudaoFallback(text, (voiceType==='mom'||voiceType==='daughter'), onComplete);
        window.speechSynthesis.speak(utterance);
    } else {
        playYoudaoFallback(text, (voiceType==='mom'||voiceType==='daughter'), onComplete);
    }
}

function playYoudaoFallback(text, isFemale, onComplete) {
    let type = isFemale ? 1 : 2;
    currentAudio = new Audio(`https://dict.youdao.com/dictvoice?type=${type}&audio=` + encodeURIComponent(text));
    currentAudio.onended = onComplete;
    currentAudio.play().catch(e => {
        console.error("Youdao fallback failed: ", e);
        onComplete();
    });
}
function playAllDialogues() {
    let btn = document.getElementById('playAllBtn');
    if(!btn) return;
    
    if(isPlayingAll) {
        isPlayingAll = false;
        if(currentAudio) currentAudio.pause();
        window.speechSynthesis.cancel();
        document.querySelectorAll('.animate-bounce').forEach(el => el.classList.remove('playing-anim'));
        btn.innerHTML = '<i class="fas fa-play"></i> 播放全部';
        return;
    }
    
    isPlayingAll = true;
    btn.innerHTML = '<i class="fas fa-stop"></i> 停止播放';
    
    let dialogues = currentDay.dialogues;
    let index = 0;
    
    function playNext() {
        if(!isPlayingAll || index >= dialogues.length) {
            isPlayingAll = false;
            if(btn) btn.innerHTML = '<i class="fas fa-play"></i> 播放全部';
            return;
        }
        
        let text = dialogues[index].en;
        let isLeft = false; let voiceType = dialogues[index].speaker || 'mom';
        let bubbleBtn = document.getElementById('dialogue-btn-' + index);
        
        if(currentAudio) currentAudio.pause();
        window.speechSynthesis.cancel();
        document.querySelectorAll('.animate-bounce').forEach(el => el.classList.remove('playing-anim'));
        
        if(bubbleBtn) {
            bubbleBtn.classList.add('playing-anim');
            bubbleBtn.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
        
        function onComplete() {
            if(bubbleBtn) bubbleBtn.classList.remove('playing-anim');
            if(isPlayingAll) {
                setTimeout(() => {
                    index++;
                    playNext();
                }, 600);
            }
        }
        
        speakWithGender(text, voiceType, onComplete);
    }
    
    playNext();
}

function playAudio(text, btnElement, voiceType = "mom") {
    if(isPlayingAll) {
        isPlayingAll = false;
        let pbtn = document.getElementById('playAllBtn');
        if(pbtn) pbtn.innerHTML = '<i class="fas fa-play"></i> 播放全部';
    }
    
    if(currentAudio) currentAudio.pause();
    window.speechSynthesis.cancel();
    
    if(btnElement) {
        btnElement.classList.add('playing-anim');
    }
    
    function onComplete() {
        if(btnElement) btnElement.classList.remove('playing-anim');
    }
    
    speakWithGender(text, voiceType, onComplete);
}
let mediaRecorder = null;
let currentRecordAudioId = null;
let recordTimeout = null;
let audioChunks = [];

function renderSavedAudioBtn(btn, url, audioId) {
    let parent = btn.parentElement;
    let oldOriginBtn = parent.firstElementChild.outerHTML; // Keep the '听原音' button
    
    parent.innerHTML = oldOriginBtn + `
        <div class="flex-1 flex gap-1 sm:gap-2">
            <button onclick="let a = new Audio('${url}'); a.play();" class="flex-1 bg-green-50 text-green-600 font-bold rounded-xl active:scale-95 flex flex-col items-center justify-center py-2"><i class="fas fa-play text-lg"></i><span class="text-[10px] mt-1">回放</span></button>
            <a href="${url}" download="${audioId}.webm" class="flex-1 bg-sky-50 text-sky-600 font-bold rounded-xl active:scale-95 flex flex-col items-center justify-center py-2"><i class="fas fa-download text-lg"></i><span class="text-[10px] mt-1">保存</span></a>
            <button onclick="toggleRecording(this.parentElement, '${audioId}')" class="flex-1 bg-rose-50 text-rose-600 font-bold rounded-xl active:scale-95 flex flex-col items-center justify-center py-2"><i class="fas fa-redo text-lg"></i><span class="text-[10px] mt-1">重录</span></button>
        </div>
    `;
}

async function toggleRecording(btn, audioId) {
    if(mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        if(recordTimeout) clearTimeout(recordTimeout);
        return;
    }
    if(!navigator.mediaDevices) return alert("浏览器不支持录音，或未开启 HTTPS！");
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        currentRecordAudioId = audioId;
        audioChunks = [];
        
        mediaRecorder.start();
        
        // Transform the clicked element into a stop button
        btn.outerHTML = `<button id="stop-btn-${audioId}" onclick="toggleRecording(this, '${audioId}')" class="flex-1 bg-red-50 border border-red-200 text-red-600 font-bold py-3 rounded-xl active:scale-95 transition"><i class="fas fa-stop-circle text-xl animate-pulse mb-1 block"></i>录音中...点击停止</button>`;
        
        // Auto stop after 10 seconds
        recordTimeout = setTimeout(() => {
            if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        }, 10000);
        
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            saveAudioToDB(audioId, audioBlob); // Save to IndexedDB
            let url = URL.createObjectURL(audioBlob);
            
            let stopBtn = document.getElementById(`stop-btn-${audioId}`);
            if(stopBtn) {
                renderSavedAudioBtn(stopBtn, url, audioId);
            }
            stream.getTracks().forEach(t => t.stop());
        };
    } catch(err) {
        alert("无法访问麦克风，请检查权限！");
    }
}

function checkSpelling(inputEl, correctWord) {
    if(inputEl.value.trim().toLowerCase() === correctWord.toLowerCase()) {
        inputEl.classList.remove('border-slate-200', 'focus:border-indigo-400');
        inputEl.classList.add('border-emerald-400', 'bg-emerald-50', 'text-emerald-600', 'shadow-inner');
        inputEl.disabled = true;
        confetti({ particleCount: 40, spread: 50, origin: { y: inputEl.getBoundingClientRect().top/window.innerHeight } });
    }
}

function renderTOC() {

    document.getElementById('homeBtn').classList.add('hidden');
    document.getElementById('dayTitle').innerText = '📖 学习打卡地图';
    
    let completedCount = Object.keys(localStorage).filter(k => k.startsWith('v2_day_')).length;
    document.getElementById('progressText').innerText = `已坚持 ${completedCount} 天 / 共 60 天`;
    
    let html = '<div class="grid grid-cols-3 gap-3">';
    DB.forEach(d => {
        let isDone = localStorage.getItem('v2_day_' + d.day);
        html += `<div onclick="openDay(${d.day})" class="cursor-pointer p-3 rounded-2xl border-2 transition active:scale-95 flex flex-col items-center justify-center ${isDone ? 'border-emerald-300 bg-emerald-50 shadow-sm' : 'border-slate-100 bg-white hover:border-indigo-200 shadow-sm'}">

            <div class="font-extrabold text-sm ${isDone ? 'text-emerald-700' : 'text-slate-600'}">Day ${d.day}</div>

function openDay(day) {
    currentDay = DB.find(d => d.day === day);
    document.getElementById('dayTitle').innerText = `Day ${currentDay.day}`;
    document.getElementById('progressText').innerText = currentDay.title;
    document.getElementById('moduleTabs').classList.remove('hidden');
    document.getElementById('homeBtn').classList.remove('hidden');

}

            let textColor = isLeft ? 'text-slate-800' : 'text-white';
            let subTextColor = isLeft ? 'text-slate-500' : 'text-indigo-100';

            html += `<div class="flex ${flexDir} items-end gap-2 sm:gap-3 w-full" style="animation: fadeIn 0.3s ease-out ${index * 0.1}s both;">
                <div class="relative group cursor-pointer flex-shrink-0" onclick="this.querySelector('img').classList.toggle('rotate-12'); this.querySelector('img').classList.toggle('scale-110')">
                    <div class="absolute inset-0 bg-indigo-200 rounded-full blur-md opacity-0 group-hover:opacity-50 transition"></div>
                    <img src="https://api.dicebear.com/9.x/bottts/svg?seed=${avatarSeed}&backgroundColor=${isLeft?'eef2ff':'c7d2fe'}" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full shadow-sm bg-indigo-50 border-2 border-white relative z-10 transition duration-300">
                </div>
                
                <div class="max-w-[80%] p-3 sm:p-4 shadow-sm rounded-2xl ${bubbleBorder} ${bgColor} border active:scale-[0.98] transition cursor-pointer relative group flex flex-col justify-center" onclick="playAudio('${d.en.replace(/'/g, "\\'")}', this.querySelector('i.fa-volume-up'), ${isLeft})">
                    <div class="flex items-start justify-between gap-3">
                        <div class="text-[15px] sm:text-base font-bold ${textColor} leading-snug font-sans">${d.en}</div>
                        <i id="dialogue-btn-${index}" class="fas fa-volume-up ${iconColor} opacity-50 group-hover:opacity-100 transition text-sm mt-1 flex-shrink-0"></i>

                        <div class="text-[12px] sm:text-sm ${subTextColor}">${d.zh}</div>
                    </div>` : ''}
                    
                    ${d.zh ? `<div class="mt-2 text-right">
                        <span class="inline-block text-[10px] ${isLeft ? 'text-slate-400 bg-slate-100' : 'text-indigo-200 bg-indigo-600'} rounded px-2 py-0.5 opacity-80 hover:opacity-100 transition" onclick="event.stopPropagation(); this.parentElement.previousElementSibling.classList.toggle('hidden')"><i class="fas fa-language"></i> 译</span>
                    </div>` : ''}
                </div>
            </div>`;
        });
        html += '</div>';
        content.innerHTML = html;
    }
    else if(tab === 'speak') {
        let html = `<div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-800 drop-shadow-sm">角色扮演</h2>
                <p class="text-sm text-rose-500 font-bold mt-1 tracking-wider uppercase">Dubbing Practice</p>
            </div>
            <button onclick="playAllDialogues()" class="bg-rose-500 text-white px-4 py-2 rounded-full font-bold shadow-md hover:bg-rose-600 active:scale-95 transition text-sm flex items-center gap-2">
