let currentDay = null;
let currentTab = 'listen';
let currentAudio = null;
let isPlayingAll = false;

let voiceCache = { male: null, female: null, inited: false };
function initVoices() {
    if(voiceCache.inited) return;
    let voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    if(voices.length === 0) return;
    
    // 尽量寻找带性别标识的声音
    voiceCache.male = voices.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('boy') || v.name.includes('Daniel') || v.name.includes('David') || v.name.includes('Mark'));
    voiceCache.female = voices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('girl') || v.name.includes('Samantha') || v.name.includes('Victoria') || v.name.includes('Karen'));
    
    // 如果没找到，兜底分配不同的声音
    if(!voiceCache.male) voiceCache.male = voices.find(v => v.lang === 'en-GB') || voices[0];
    if(!voiceCache.female) voiceCache.female = voices.find(v => v.lang === 'en-US' && v !== voiceCache.male) || voices[voices.length - 1] || voices[0];
    
    voiceCache.inited = true;
}
if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = initVoices;
}

function speakWithGender(text, isLeft, onComplete) {
    initVoices();
    let isMale = !isLeft; // 左边机器人设定为女声，右边机器人设定为男声
    
    if ('speechSynthesis' in window && window.speechSynthesis.getVoices().length > 0) {
        let utterance = new SpeechSynthesisUtterance(text);
        let targetVoice = isMale ? voiceCache.male : voiceCache.female;
        
        if(targetVoice) utterance.voice = targetVoice;
        else utterance.lang = isMale ? 'en-GB' : 'en-US';
        
        utterance.rate = 0.85;
        // 如果没找到不同性别的声音，靠大幅调整音高来模拟男女声
        if(voiceCache.male === voiceCache.female) {
            utterance.pitch = isMale ? 0.5 : 1.5; 
        } else {
            utterance.pitch = isMale ? 0.9 : 1.1; 
        }
        
        utterance.onend = onComplete;
        utterance.onerror = () => playYoudaoFallback(text, isLeft, onComplete);
        window.speechSynthesis.speak(utterance);
    } else {
        playYoudaoFallback(text, isLeft, onComplete);
    }
}

function playYoudaoFallback(text, isLeft, onComplete) {
    let voiceType = isLeft ? 1 : 2; 
    currentAudio = new Audio(`https://dict.youdao.com/dictvoice?type=${voiceType}&audio=` + encodeURIComponent(text));
    currentAudio.onended = onComplete;
    currentAudio.play().catch(e => {
        console.log("All TTS engines failed");
        onComplete();
    });
}

function playAllDialogues() {
    let btn = document.getElementById('playAllBtn');
    if(!btn) return;
    
    if(isPlayingAll) {
        isPlayingAll = false;
        if(currentAudio) currentAudio.pause();
        window.speechSynthesis.cancel();
        document.querySelectorAll('.animate-bounce').forEach(el => el.classList.remove('animate-bounce', 'text-indigo-500'));
        btn.innerHTML = '<i class="fas fa-play"></i> 播放全部';
        return;
    }
    
    isPlayingAll = true;
    btn.innerHTML = '<i class="fas fa-stop"></i> 停止播放';
    
    let dialogues = currentDay.dialogues;
    let index = 0;
    
    function playNext() {
        if(!isPlayingAll || index >= dialogues.length) {
            isPlayingAll = false;
            if(btn) btn.innerHTML = '<i class="fas fa-play"></i> 播放全部';
            return;
        }
        
        let text = dialogues[index].en;
        let isLeft = (index % 2 === 0);
        let bubbleBtn = document.getElementById('dialogue-btn-' + index);
        
        if(currentAudio) currentAudio.pause();
        window.speechSynthesis.cancel();
        document.querySelectorAll('.animate-bounce').forEach(el => el.classList.remove('animate-bounce', 'text-indigo-500'));
        
        if(bubbleBtn) {
            bubbleBtn.classList.add('animate-bounce', 'text-indigo-500');
            bubbleBtn.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
        
        function onComplete() {
            if(bubbleBtn) bubbleBtn.classList.remove('animate-bounce', 'text-indigo-500');
            if(isPlayingAll) {
                setTimeout(() => {
                    index++;
                    playNext();
                }, 600);
            }
        }
        
        speakWithGender(text, isLeft, onComplete);
    }
    
    playNext();
}

function playAudio(text, btnElement, isLeft = true) {
    if(isPlayingAll) {
        isPlayingAll = false;
        let pbtn = document.getElementById('playAllBtn');
        if(pbtn) pbtn.innerHTML = '<i class="fas fa-play"></i> 播放全部';
    }
    
    if(currentAudio) currentAudio.pause();
    window.speechSynthesis.cancel();
    
    if(btnElement) {
        btnElement.classList.add('animate-bounce', 'text-indigo-500');
    }
    
    function onComplete() {
        if(btnElement) btnElement.classList.remove('animate-bounce', 'text-indigo-500');
    }
    
    speakWithGender(text, isLeft, onComplete);
}
let mediaRecorder;
let audioChunks = [];
let recordedAudioUrl = null;

async function toggleRecording(btn) {
    if(mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        return;
    }
    if(!navigator.mediaDevices) return alert("浏览器不支持录音功能！请在手机浏览器中重试。");
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();
        
        btn.innerHTML = '<i class="fas fa-stop-circle text-red-500 animate-pulse"></i> 录音中...点击停止';
        btn.classList.add('bg-red-50', 'border-red-200');
        
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            recordedAudioUrl = URL.createObjectURL(audioBlob);
            audioChunks = [];
            
            btn.innerHTML = '<i class="fas fa-play-circle text-green-500"></i> 回放我的录音';
            btn.classList.remove('bg-red-50', 'border-red-200');
            btn.classList.add('bg-green-50', 'border-green-200');
            btn.onclick = () => {
                let audio = new Audio(recordedAudioUrl);
                btn.classList.add('opacity-70');
                audio.onended = () => btn.classList.remove('opacity-70');
                audio.play();
            };
        };
    } catch(err) {
        alert("请允许网页使用麦克风！");
    }
}

function checkSpelling(inputEl, correctWord) {
    if(inputEl.value.trim().toLowerCase() === correctWord.toLowerCase()) {
        inputEl.classList.remove('border-slate-200', 'focus:border-indigo-400');
        inputEl.classList.add('border-emerald-400', 'bg-emerald-50', 'text-emerald-600', 'shadow-inner');
        inputEl.disabled = true;
        confetti({ particleCount: 40, spread: 50, origin: { y: inputEl.getBoundingClientRect().top/window.innerHeight } });
    }
}

function renderTOC() {
    document.getElementById('moduleTabs').classList.add('hidden');
    document.getElementById('homeBtn').classList.add('hidden');
    document.getElementById('dayTitle').innerText = '📖 学习打卡地图';
    
    let completedCount = Object.keys(localStorage).filter(k => k.startsWith('v2_day_')).length;
    document.getElementById('progressText').innerText = `已坚持 ${completedCount} 天 / 共 60 天`;
    
    let html = '<div class="grid grid-cols-3 gap-3">';
    DB.forEach(d => {
        let isDone = localStorage.getItem('v2_day_' + d.day);
        html += `<div onclick="openDay(${d.day})" class="cursor-pointer p-3 rounded-2xl border-2 transition active:scale-95 flex flex-col items-center justify-center ${isDone ? 'border-emerald-300 bg-emerald-50 shadow-sm' : 'border-slate-100 bg-white hover:border-indigo-200 shadow-sm'}">
            <div class="text-3xl mb-1">${isDone ? '⭐' : '📚'}</div>
            <div class="font-extrabold text-sm ${isDone ? 'text-emerald-700' : 'text-slate-600'}">Day ${d.day}</div>
        </div>`;
    });
    html += '</div>';
    document.getElementById('contentArea').innerHTML = html;
}

function openDay(day) {
    currentDay = DB.find(d => d.day === day);
    document.getElementById('dayTitle').innerText = `Day ${currentDay.day}`;
    document.getElementById('progressText').innerText = currentDay.title;
    document.getElementById('moduleTabs').classList.remove('hidden');
    document.getElementById('homeBtn').classList.remove('hidden');
    switchTab('listen');
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'text-indigo-600'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active', 'text-indigo-600');
    
    let content = document.getElementById('contentArea');
    content.scrollTop = 0;
    
    if(tab === 'listen') {
        let html = '<div class="flex justify-between items-center mb-4 sticky top-0 bg-slate-50/90 backdrop-blur-sm z-10 py-2"><h3 class="font-extrabold text-lg text-slate-800 flex items-center gap-2"><i class="fas fa-comments text-indigo-500"></i> 情景对话</h3><button id="playAllBtn" onclick="playAllDialogues()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-600 text-sm font-bold py-1.5 px-4 rounded-full transition shadow-sm active:scale-95 flex items-center gap-2"><i class="fas fa-play"></i> 播放全部</button></div>';
        html += '<div class="flex flex-col gap-4 pb-4 px-1">';
        currentDay.dialogues.forEach((d, index) => {
            let isLeft = index % 2 === 0;
            let avatarSeed = isLeft ? `RobotA${currentDay.day}` : `RobotB${currentDay.day}`;
            let bgColor = isLeft ? 'bg-white border-slate-200' : 'bg-indigo-500 text-white border-indigo-600 shadow-indigo-200';
            let textColor = isLeft ? 'text-slate-800' : 'text-white';
            let subTextColor = isLeft ? 'text-slate-500' : 'text-indigo-100';
            let iconColor = isLeft ? 'text-indigo-300' : 'text-indigo-300';
            let flexDir = isLeft ? 'flex-row' : 'flex-row-reverse';
            let bubbleBorder = isLeft ? 'rounded-tl-sm' : 'rounded-tr-sm';

            html += `<div class="flex ${flexDir} items-end gap-2 sm:gap-3 w-full" style="animation: fadeIn 0.3s ease-out ${index * 0.1}s both;">
                <div class="relative group cursor-pointer flex-shrink-0" onclick="this.querySelector('img').classList.toggle('rotate-12'); this.querySelector('img').classList.toggle('scale-110')">
                    <div class="absolute inset-0 bg-indigo-200 rounded-full blur-md opacity-0 group-hover:opacity-50 transition"></div>
                    <img src="https://api.dicebear.com/9.x/bottts/svg?seed=${avatarSeed}&backgroundColor=${isLeft?'eef2ff':'c7d2fe'}" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full shadow-sm bg-indigo-50 border-2 border-white relative z-10 transition duration-300">
                </div>
                
                <div class="max-w-[80%] p-3 sm:p-4 shadow-sm rounded-2xl ${bubbleBorder} ${bgColor} border active:scale-[0.98] transition cursor-pointer relative group flex flex-col justify-center" onclick="playAudio('${d.en.replace(/'/g, "\'")}', this.querySelector('i.fa-volume-up'), ${isLeft})">
                    <div class="flex items-start justify-between gap-3">
                        <div class="text-[15px] sm:text-base font-bold ${textColor} leading-snug font-sans">${d.en}</div>
                        <i id="dialogue-btn-${index}" class="fas fa-volume-up ${iconColor} opacity-50 group-hover:opacity-100 transition text-sm mt-1 flex-shrink-0"></i>
                    </div>
                    
                    ${d.zh ? `<div class="translation-block hidden mt-2 pt-2 border-t ${isLeft ? 'border-slate-200' : 'border-indigo-400 border-opacity-50'}">
                        <div class="text-[12px] sm:text-sm ${subTextColor}">${d.zh}</div>
                    </div>` : ''}
                    
                    ${d.zh ? `<div class="mt-2 text-right">
                        <span class="inline-block text-[10px] ${isLeft ? 'text-slate-400 bg-slate-100' : 'text-indigo-200 bg-indigo-600'} rounded px-2 py-0.5 opacity-80 hover:opacity-100 transition" onclick="event.stopPropagation(); this.parentElement.previousElementSibling.classList.toggle('hidden')"><i class="fas fa-language"></i> 译</span>
                    </div>` : ''}
                </div>
            </div>`;
        });
        html += '</div>';
        content.innerHTML = html;
    }
    else if(tab === 'speak') {
        let html = '<h3 class="font-extrabold text-lg text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-bullhorn text-pink-500"></i> 开口大声说</h3><div class="flex flex-col gap-4">';
        let itemsToSpeak = currentDay.words.slice(0, 3);
        if(itemsToSpeak.length === 0 && currentDay.dialogues.length > 0) itemsToSpeak = [{en: currentDay.dialogues[0].en, zh: currentDay.dialogues[0].zh}];
        
        itemsToSpeak.forEach((w) => {
            html += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-pink-400 to-rose-400"></div>
                <div class="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-1 mt-2">${w.en}</div>
                <div class="text-slate-500 mb-6 text-sm font-medium">${w.zh}</div>
                <div class="flex justify-center gap-3">
                    <button onclick="playAudio('${w.en.replace(/'/g, "\'")}', this.querySelector('i'))" class="flex-1 bg-indigo-50 text-indigo-600 font-bold py-3 rounded-xl active:scale-95 transition"><i class="fas fa-volume-up mb-1 block text-xl"></i>听原音</button>
                    <button onclick="toggleRecording(this)" class="flex-1 bg-rose-50 border border-rose-100 text-rose-600 font-bold py-3 rounded-xl active:scale-95 transition"><i class="fas fa-microphone mb-1 block text-xl"></i>录音</button>
                </div>
            </div>`;
        });
        html += '</div>';
        content.innerHTML = html;
    }
    else if(tab === 'read') {
        let html = `<div class="flex justify-between items-center mb-4">
            <h3 class="font-extrabold text-lg text-slate-800 flex items-center gap-2"><i class="fas fa-book-reader text-blue-500"></i> 核心词汇</h3>
            <button onclick="document.querySelectorAll('.zh-hide').forEach(el => el.classList.toggle('opacity-0'))" class="text-xs font-bold bg-slate-200 hover:bg-slate-300 text-slate-600 px-3 py-1.5 rounded-lg transition shadow-sm active:scale-95">👓 遮挡中文测试</button>
        </div><div class="grid grid-cols-1 gap-3">`;
        
        currentDay.words.forEach(w => {
            html += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between active:scale-[0.98] transition cursor-pointer" onclick="playAudio('${w.en.replace(/'/g, "\'")}', this.querySelector('i'))">
                <div>
                    <div class="text-xl font-extrabold text-slate-800 flex items-center gap-3 tracking-wide">${w.en} <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md tracking-normal">${w.phonetic||''}</span></div>
                    <div class="text-sm font-medium text-slate-500 mt-1 zh-hide transition-opacity duration-300">${w.zh}</div>
                </div>
                <i class="fas fa-volume-up text-blue-400 text-xl ml-4"></i>
            </div>`;
        });
        html += '</div>';
        content.innerHTML = html;
    }
    else if(tab === 'write') {
        let html = '<h3 class="font-extrabold text-lg text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-pencil-ruler text-emerald-500"></i> 拼写与书写</h3>';
        
        if(currentDay.letters && currentDay.letters.length > 0) {
            html += '<div class="grid grid-cols-2 gap-3 mb-6">';
            currentDay.letters.forEach(l => {
                html += `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 text-center cursor-pointer active:scale-95 transition" onclick="playAudio('${l[0]}')">
                    <svg width="100%" height="60" viewBox="0 0 80 60" class="mx-auto block">
                        <line x1="5" y1="10" x2="75" y2="10" stroke="#fca5a5" stroke-width="1.5" />
                        <line x1="5" y1="24" x2="75" y2="24" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="2" />
                        <line x1="5" y1="38" x2="75" y2="38" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="2" />
                        <line x1="5" y1="52" x2="75" y2="52" stroke="#fca5a5" stroke-width="1.5" />
                        <text x="40" y="38" font-family="'Edu SA Beginner', cursive" font-size="34" fill="#1e293b" text-anchor="middle">${l}</text>
                    </svg>
                    <div class="mt-2 text-xs font-bold text-emerald-600 bg-emerald-50 inline-block px-2 py-1 rounded-md"><i class="fas fa-volume-up"></i> 听音发音</div>
                </div>`;
            });
            html += '</div>';
        }
        
        if(currentDay.words && currentDay.words.length > 0) {
            html += '<div class="space-y-3">';
            currentDay.words.forEach((w) => {
                let cleanWord = w.en.replace(/[^a-zA-Z\s]/g, '');
                if(cleanWord.length > 1) {
                    html += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <div class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">翻译并拼写</div>
                        <div class="text-lg font-extrabold text-slate-800 mb-3">${w.zh}</div>
                        <input type="text" oninput="checkSpelling(this, '${cleanWord}')" placeholder="输入英文..." class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 text-xl font-extrabold outline-none focus:border-indigo-400 transition placeholder:font-normal placeholder:text-sm bg-slate-50 focus:bg-white text-slate-700 tracking-wider">
                    </div>`;
                }
            });
            html += '</div>';
        }
        
        let isDone = localStorage.getItem('v2_day_' + currentDay.day);
        html += `<button onclick="finishDay(this)" class="w-full mt-6 bg-gradient-to-r from-emerald-400 to-teal-500 text-white font-extrabold text-lg py-4 rounded-2xl shadow-lg hover:shadow-xl active:scale-[0.98] transition shadow-emerald-500/30" ${isDone ? 'disabled style="opacity:0.8"' : ''}>${isDone ? '✅ 今日已打卡' : '✨ 完成今日打卡 ✨'}</button>`;
        content.innerHTML = html;
    }
}

function finishDay(btn) {
    localStorage.setItem('v2_day_' + currentDay.day, 'true');
    btn.innerHTML = '✅ 今日已打卡';
    btn.disabled = true;
    confetti({ particleCount: 150, spread: 80, origin: { y: 0.8 }, zIndex: 100 });
    setTimeout(goHome, 2500);
}

function goHome() { renderTOC(); }
goHome();
